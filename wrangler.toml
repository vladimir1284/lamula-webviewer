# Config del proyecto Pages del viewer.
#
# Con wrangler.toml presente, los bindings de Pages se declaran AQUÍ (el
# fichero manda sobre el dashboard). Declarar el binding no da capacidad
# de migrar nada: el schema lo posee nexrad-l3-pipeline y este repo solo
# ejecuta SELECT (docs/decisiones.md #17).
#
# Setup una vez (docs/contrato.md § "Requisitos de setup fuera del código"):
#   1. wrangler pages project create lamula-webviewer --production-branch main
#   2. Para previews puede apuntarse a `nexrad-l3-test` vía [env.preview].
#
# En local, `wrangler pages dev` crea una D1 vacía (miniflare) — la ruta
# /api/radars degrada a su estado de error explícito; es lo esperado.

name = "lamula-webviewer"
pages_build_output_dir = "dist"
compatibility_date = "2026-07-01"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "nexrad-l3"
database_id = "d7b5d89f-d33c-46ff-8ae9-a1116662670e"
